<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cambridge Storm — Збережи капітал</title>
  <style>
    :root {
      --bg: #0f1226;
      --panel: rgba(255,255,255,0.08);
      --panel-strong: rgba(255,255,255,0.14);
      --text: #f5f7ff;
      --muted: #b9c0e0;
      --accent: #7c5cff;
      --green: #2ecc71;
      --red: #ff5d73;
      --yellow: #ffd166;
      --blue: #4cc9f0;
      --pink: #ff77c8;
      --shadow: 0 16px 40px rgba(0,0,0,0.25);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,92,255,0.35), transparent 28%),
        radial-gradient(circle at top right, rgba(76,201,240,0.18), transparent 25%),
        linear-gradient(180deg, #11152d 0%, #0b0e20 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .hero-main {
      padding: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(124,92,255,0.16);
      color: #e9e2ff;
      border: 1px solid rgba(124,92,255,0.35);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 40px;
      line-height: 1.05;
    }

    .sub {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
      max-width: 700px;
      margin-bottom: 18px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .primary {
      background: linear-gradient(135deg, #8b6dff, #7c5cff);
      color: white;
    }

    .secondary {
      background: rgba(255,255,255,0.1);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hero-side {
      padding: 20px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .stat {
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 18px;
    }

    .coin-card {
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .coin-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .coin-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 800;
    }

    .coin-emoji {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(255,255,255,0.12);
      font-size: 21px;
    }

    .coin-type {
      color: var(--muted);
      font-size: 13px;
      min-height: 60px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin: 8px 0;
      align-items: center;
    }

    .label {
      color: var(--muted);
      font-size: 14px;
    }

    .value {
      font-weight: 700;
      font-size: 16px;
    }

    input, select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 13px;
      font-size: 15px;
      outline: none;
    }

    .sections {
      display: grid;
